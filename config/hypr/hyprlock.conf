general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(1a1a1aee)
    blur_passes = 1
    blur_size = 3
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
    monitor =
    text = $TIME
    color = rgba(e0e0e0ff)
    font_size = 72
    font_family = Hurmit Nerd Font Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$USER"
    color = rgba(888888ff)
    font_size = 18
    font_family = Hurmit Nerd Font Mono
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(333333ff)
    inner_color = rgba(242424ff)
    font_color = rgba(e0e0e0ff)
    fade_on_empty = false
    placeholder_text = Password
    hide_input = false
    check_color = rgba(33ccffff)
    fail_color = rgba(ff6666ff)
    position = 0, -40
    halign = center
    valign = center
}
